# Builds the RP2350B firmware using the Raspberry Pi Pico SDK (arm-none-eabi-gcc).

name: Firmware Build (RP2350B)

on:
  push:
    paths:
      - 'firmware/rp2350b/**'
      - '.github/workflows/firmware-build.yml'
  pull_request:
    paths:
      - 'firmware/rp2350b/**'
      - '.github/workflows/firmware-build.yml'

permissions:
  contents: read

jobs:
  build-firmware:
    name: Build RP2350B Firmware
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sdk-version: ['2.0.0']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi \
            cmake ninja-build python3

      - name: Fetch Raspberry Pi Pico SDK
        run: |
          git clone --depth 1 --branch ${{ matrix.sdk-version }} \
            https://github.com/raspberrypi/pico-sdk.git /opt/pico-sdk
          cd /opt/pico-sdk
          git submodule update --init --recursive

      - name: Configure CMake
        run: |
          mkdir -p firmware/rp2350b/build
          cd firmware/rp2350b/build
          cmake .. \
            -DPICO_SDK_PATH=/opt/pico-sdk \
            -DPICO_PLATFORM=rp2350 \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build firmware
        run: |
          cd firmware/rp2350b/build
          ninja -v 2>&1 | tee build.log

      - name: Check firmware outputs
        run: |
          cd firmware/rp2350b/build
          echo "=== Build artifacts ==="
          ls -la *.uf2 *.hex *.bin *.elf 2>/dev/null || echo "No standard artifacts found"
          echo "=== Build log size ==="
          wc -l build.log

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rp2350b-firmware-${{ matrix.sdk-version }}
          path: |
            firmware/rp2350b/build/*.uf2
            firmware/rp2350b/build/*.hex
            firmware/rp2350b/build/*.bin
            firmware/rp2350b/build/*.elf
          retention-days: 14

  check-firmware-style:
    name: Check Firmware Code Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install format checker
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check C code formatting
        run: |
          cd firmware/rp2350b
          find . -name '*.c' -o -name '*.h' | while read f; do
            clang-format --style=file --dry-run --Werror "$f" 2>&1 || true
          done
          echo "Style check complete (warnings are non-blocking for now)"