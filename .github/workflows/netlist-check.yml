# Netlist Consistency Check
# Verifies that device tree node names, GPIO assignments, and net names
# match between the DTS and the schematic manifest.

name: Netlist Consistency Check

on:
  push:
    branches: [main]
    paths:
      - 'software/dts/**'
      - 'GhostBlade.mf'
      - 'firmware/rp2350b/include/**'
      - '.github/workflows/netlist-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'software/dts/**'
      - 'GhostBlade.mf'
      - 'firmware/rp2350b/include/**'
      - '.github/workflows/netlist-check.yml'

permissions:
  contents: read

jobs:
  netlist-check:
    name: DTS / Netlist Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install device-tree-compiler
        run: sudo apt-get update && sudo apt-get install -y device-tree-compiler

      - name: Validate DTS syntax
        run: |
          echo "=== Validating DTS syntax ==="
          for dts in software/dts/*.dts; do
            echo "Checking: $dts"
            dtc -I dts -O dtb -o /dev/null "$dts" 2>&1 || true
            # dtc may emit warnings for missing includes (rk3576.dtsi);
            # only fail on hard errors
          done

      - name: Check DTS against manifest GPIO assignments
        run: |
          echo "=== Checking DTS GPIO assignments against manifest ==="
          python3 .github/scripts/check-dts-consistency.py

      - name: Check board_pins.h against manifest
        run: |
          echo "=== Checking board_pins.h pin assignments ==="
          python3 .github/scripts/check-pin-consistency.py