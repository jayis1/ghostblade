# Builds the apex_bridge kernel module and runs static analysis.

name: Kernel Driver Build & Lint

on:
  push:
    paths:
      - 'software/linux-drivers/**'
      - '.github/workflows/driver-build.yml'
  pull_request:
    paths:
      - 'software/linux-drivers/**'
      - '.github/workflows/driver-build.yml'

permissions:
  contents: read

jobs:
  build-driver:
    name: Build Kernel Module
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kernel-version: ['6.1', '6.5', '6.8']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential linux-headers-${{ matrix.kernel-version }}-generic \
            kmod flex bison

      - name: Build kernel module
        run: |
          cd software/linux-drivers
          make -C /lib/modules/${{ matrix.kernel-version }}-generic/build \
            M=$(pwd) modules 2>&1 | tee build.log || true
          echo "=== Build result ==="
          ls -la *.ko 2>/dev/null || echo "No .ko files (expected on CI without full kernel tree)"

      - name: Check module symbols
        if: always()
        run: |
          cd software/linux-drivers
          if [ -f apex_bridge.ko ]; then
            modinfo apex_bridge.ko
            nm apex_bridge.ko | grep -i "apex_" | head -20
          fi

  lint-driver:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sparse cppcheck clang-format

      - name: Run cppcheck
        run: |
          cd software/linux-drivers
          cppcheck --enable=warning,style,performance,portability \
            --suppress=missingInclude \
            --template='[{file}:{line}]: {severity}: {message}' \
            src/ include/ 2>&1 | tee cppcheck-report.txt
          echo "=== cppcheck summary ==="
          grep -c "warning\|error\|style" cppcheck-report.txt || echo "No issues found"

      - name: Check kernel coding style
        run: |
          cd software/linux-drivers
          # Check for tab indentation, line length, brace placement
          for f in $(find src include -name '*.c' -o -name '*.h'); do
            # Check for spaces instead of tabs for indentation
            if grep -Pn '^\t' "$f" > /dev/null 2>&1; then
              echo "OK: $f uses tab indentation"
            else
              echo "WARNING: $f may not use tab indentation"
            fi
            # Check line length (kernel style: 80 columns preferred, 100 max)
            long_lines=$(awk 'length > 100' "$f" | wc -l)
            if [ "$long_lines" -gt 0 ]; then
              echo "INFO: $f has $long_lines lines > 100 chars"
            fi
          done
          echo "Style check complete"

      - name: Run sparse (if kernel headers available)
        run: |
          cd software/linux-drivers
          # Sparse requires kernel headers; attempt but don't fail
          make C=2 CF="-D__CHECK_ENDIAN__" 2>&1 | head -50 || true
          echo "Sparse check attempted (may not work without full kernel tree)"

  build-libapex:
    name: Build libapex Library
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev python3-pip

      - name: Build C library
        run: |
          cd software/libapex
          make all

      - name: Verify library artifacts
        run: |
          cd software/libapex
          ls -la build/
          file build/libapex.a
          file build/libapex.so

      - name: Build Python extension
        run: |
          cd software/libapex
          pip3 install --user setuptools wheel
          python3 setup.py build_ext --inplace 2>&1 || true
          echo "Python extension build attempted"

  run-unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build and run SPI protocol tests
        run: |
          cd tests
          gcc -Wall -Wextra -Wpedantic -std=c11 -DNO_CMOCKA \
            -o test_spi_protocol test_spi_protocol.c
          ./test_spi_protocol
          echo "=== Test exit code: $? ==="