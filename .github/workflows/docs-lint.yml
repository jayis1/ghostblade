# Docs Lint — Markdownlint & Spellcheck
# Checks all markdown documentation for style and spelling errors.

name: Docs Lint

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.markdownlint.json'
      - '.github/workflows/docs-lint.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.md'
      - '.markdownlint.json'
      - '.github/workflows/docs-lint.yml'

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint markdown files
        run: |
          markdownlint \
            --ignore node_modules \
            --ignore hardware/bom/ghostblade-bom-interactive.html \
            '**/*.md'

  codespell:
    name: Spellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install codespell
        run: pip install codespell

      - name: Run codespell
        run: |
          codespell \
            --skip='./.git,./node_modules' \
            --ignore-words='./.codespell.ignore' \
            --check-hidden \
            '**/*.md' '**/*.c' '**/*.h' '**/*.dts' '**/*.py'

  linkcheck:
    name: Internal Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check internal markdown links
        run: |
          chmod +x .github/scripts/check-links.sh
          .github/scripts/check-links.sh